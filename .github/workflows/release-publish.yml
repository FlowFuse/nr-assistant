name: Release Published
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
      - run: npm ci --omit=dev
      - uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # v4.1.5
        with:
          token: ${{ secrets.NPM_PUBLISH_TOKEN }}
          access: public
      - name: getVersion
        id: getVersion
        shell: bash
        run: |
          echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
      - uses: flowfuse/github-actions-workflows/actions/update-nr-flows@v0.52.0
        with:
          package: '@flowfuse/nr-assistant'
          version: ${{ steps.getVersion.outputs.version }}

  bump_nr_launcher:
    name: Bump nr-assistant in nr-launcher
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate_token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3.1.1
        with:
          client-id: ${{ secrets.GH_BOT_APP_ID }}
          private-key: ${{ secrets.GH_BOT_APP_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: nr-launcher

      - name: Strip v prefix from tag
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: flowfuse/nr-launcher
          token: ${{ steps.generate_token.outputs.token }}

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24

      - name: Update @flowfuse/nr-assistant dependency
        run: npm install @flowfuse/nr-assistant@^${{ steps.version.outputs.semver }}

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ steps.generate_token.outputs.token }}
          commit-message: "chore: bump @flowfuse/nr-assistant to ^${{ steps.version.outputs.semver }}"
          title: "chore: bump @flowfuse/nr-assistant to ^${{ steps.version.outputs.semver }}"
          body: |
            Automated PR to update `@flowfuse/nr-assistant` to `^${{ steps.version.outputs.semver }}`.

            Triggered by [release ${{ github.ref_name }}](${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}).
          branch: chore-bump-nr-assistant
          base: main
          delete-branch: true
